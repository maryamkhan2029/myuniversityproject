<!DOCTYPE html>
<html>
<head>
    <title>Student Quiz</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            background: #28a745;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h2>🧪 Available Quizzes</h2>

{% for quiz in quizzes %}

<div class="card">

    <div class="title">
        {{ quiz[1] }}
    </div>

    <p>Type: {{ quiz[2] }}</p>

    <a class="btn" href="/student/take-quiz/{{ quiz[0] }}">
        Start Quiz
    </a>

</div>

{% endfor %}

</body>
</html>
