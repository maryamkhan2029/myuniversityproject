<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

/* MAIN CONTAINER */
.container{
    width:900px;
    max-width:100%;
    display:flex;
    overflow:hidden;
    border-radius:25px;
    box-shadow:0 25px 60px rgba(0,0,0,.35);
}

/* LEFT SIDE */
.left{
    flex:1;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.left .icon{
    font-size:90px;
    margin-bottom:20px;
}

.left h1{
    font-size:34px;
    margin-bottom:10px;
}

.left p{
    font-size:15px;
    opacity:.9;
    line-height:1.7;
}

/* RIGHT SIDE */
.right{
    flex:1;
    background:white;
    padding:50px;
}

.logo{
    text-align:center;
    font-size:50px;
    color:#2563eb;
    margin-bottom:10px;
}

.right h2{
    text-align:center;
    color:#111827;
    margin-bottom:30px;
}

/* INPUT BOX */
.input-box{
    position:relative;
    margin-bottom:18px;
}

.input-box i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:#64748b;
}

.input-box input{
    width:100%;
    padding:14px 15px 14px 45px;
    border:2px solid #e2e8f0;
    border-radius:12px;
    outline:none;
    transition:.3s;
    font-size:14px;
}

.input-box input:focus{
    border-color:#2563eb;
    box-shadow:0 0 10px rgba(37,99,235,.15);
}

/* BUTTON */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

.links a:hover{
    text-decoration:underline;
}

/* MOBILE */
@media(max-width:800px){

.container{
    flex-direction:column;
}

.left{
    padding:35px;
}

.right{
    padding:35px;
}

}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left">

        <div class="icon">
            <i class="fa-solid fa-graduation-cap"></i>
        </div>

        <h1>Welcome to Student login</h1>

        <p>
            Access your assignments, attendance, AI assistant and academic
            dashboard from one place.
        </p>

    </div>

    <!-- LOGIN PANEL -->
    <div class="right">

        <div class="logo">
            <i class="fa-solid fa-user-graduate"></i>
        </div>

        <h2>Student Login</h2>

        <form method="POST" action="/student/login">

            <div class="input-box">
                <i class="fa-solid fa-id-card"></i>
                <input type="text"
                       name="roll_no"
                       placeholder="Enter Roll Number"
                       required>
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password"
                       name="password"
                       placeholder="Enter Password"
                       required>
            </div>

            <button class="btn" type="submit">
                Login Now
            </button>

        </form>

        <div class="links">
            <a href="/student/register">
                Create New Account
            </a>
        </div>

    </div>

</div>

</body>
</html>
