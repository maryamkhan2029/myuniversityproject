<!DOCTYPE html>
<html>
<head>
<title>Upload Notes</title>

<style>

body{
    font-family:Arial;
    background:#f1f5f9;
    padding:20px;
}

h2{
    background:linear-gradient(135deg,#2563eb,#1e40af);
    color:white;
    padding:18px;
    border-radius:12px;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    max-width:500px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:8px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1e40af;
}

</style>
</head>

<body>

<h2>📚 Upload Notes</h2>

<div class="card">

    <form method="POST" enctype="multipart/form-data">

        <input type="text" name="title" placeholder="Note Title" required>

        <input type="file" name="file" required>

        <!-- ✅ FIXED BUTTON (NO DOUBLE SUBMIT) -->
        <button type="submit" onclick="this.disabled=true; this.innerText='Uploading...'; this.form.submit();">
            Upload
        </button>

    </form>

</div>

</body>
</html>
