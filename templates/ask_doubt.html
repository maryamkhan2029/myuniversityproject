<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Doubt</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f8fafc,#eef2ff,#e0e7ff);
    padding:20px;
}

/* MAIN CARD */

.card{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
}

/* HEADER */

.header{
    background:linear-gradient(135deg,#4f46e5,#3b82f6);
    padding:35px;
    text-align:center;
    color:white;
}

.header h2{
    font-size:30px;
    margin-bottom:8px;
}

.header p{
    opacity:.9;
    font-size:14px;
}

/* CONTENT */

.content{
    padding:30px;
}

.label{
    display:block;
    margin-bottom:10px;
    color:#374151;
    font-weight:600;
}

/* TEXTAREA */

textarea{
    width:100%;
    height:180px;
    resize:none;

    border:2px solid #e5e7eb;
    border-radius:18px;

    padding:18px;
    outline:none;

    font-size:15px;
    color:#111827;

    transition:.3s;
}

textarea:focus{
    border-color:#4f46e5;
    box-shadow:0 0 0 4px rgba(79,70,229,.1);
}

/* BUTTON */

.btn{
    width:100%;
    margin-top:20px;

    border:none;
    border-radius:16px;

    padding:15px;

    font-size:15px;
    font-weight:600;

    color:white;
    cursor:pointer;

    background:linear-gradient(135deg,#4f46e5,#3b82f6);

    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(79,70,229,.25);
}

/* INFO BOX */

.info{
    margin-top:18px;
    padding:14px;
    border-radius:14px;
    background:#f8fafc;
    color:#64748b;
    font-size:13px;
    text-align:center;
}

/* MOBILE */

@media(max-width:768px){

.header h2{
    font-size:24px;
}

.content{
    padding:20px;
}

textarea{
    height:150px;
}

}

</style>
</head>

<body>

<div class="card">

    <div class="header">
        <h2>💡 Ask a Doubt</h2>
        <p>Submit your academic questions and receive guidance from your teachers</p>
    </div>

    <div class="content">

        <form method="POST">

            <label class="label">
                Enter Your Question
            </label>

            <textarea
                name="question"
                placeholder="Write your doubt here..."
                required></textarea>

            <button class="btn" type="submit">
                🚀 Submit Doubt
            </button>

        </form>

        <div class="info">
            Your question will be forwarded to the teacher for review and response.
        </div>

    </div>

</div>

</body>
</html>
