<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            overflow:hidden;
            position:relative;
        }

        /* Floating Circles */
        .circle{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
        }

        .c1{
            width:220px;
            height:220px;
            top:-60px;
            left:-60px;
        }

        .c2{
            width:180px;
            height:180px;
            bottom:-50px;
            right:-50px;
        }

        .card{
            width:420px;
            padding:35px;
            border-radius:25px;
            background:rgba(255,255,255,0.18);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.3);
            box-shadow:0 15px 35px rgba(0,0,0,0.15);
            color:white;
        }

        .logo{
            text-align:center;
            font-size:55px;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            font-size:30px;
            font-weight:700;
        }

        .input-box{
            position:relative;
            margin-bottom:18px;
        }

        .input-box i{
            position:absolute;
            left:15px;
            top:50%;
            transform:translateY(-50%);
            color:#555;
        }

        .input-box input{
            width:100%;
            padding:13px 15px 13px 45px;
            border:none;
            border-radius:12px;
            outline:none;
            background:white;
            font-size:14px;
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:white;
            color:#1976d2;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .login-link{
            text-align:center;
            margin-top:18px;
        }

        .login-link a{
            color:white;
            text-decoration:none;
            font-weight:600;
        }

        .login-link a:hover{
            text-decoration:underline;
        }

        .welcome{
            text-align:center;
            font-size:14px;
            opacity:.9;
            margin-bottom:20px;
        }
    </style>
</head>

<body>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="card">

    <div class="logo">
        <i class="fa-solid fa-user-graduate"></i>
    </div>

    <h2>Create Account</h2>

    <div class="welcome">
        Join the Student Portal and start learning
    </div>

    <form method="POST" action="/student/register">

        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" name="name"
            placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" name="email"
            placeholder="Email Address" required>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-id-card"></i>
            <input type="text" name="roll_no"
            placeholder="Roll Number" required>
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password"
            placeholder="Password" required>
        </div>

        <button class="btn" type="submit">
            Register Now
        </button>

    </form>

    <div class="login-link">
        <a href="/student/login">
            Already have an account? Login
        </a>
    </div>

</div>

</body>
</html>
