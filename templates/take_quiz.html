<!DOCTYPE html>
<html>
<head>
    <title>Take Quiz</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            width: 500px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .question {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .option {
            display: block;
            background: #f1f3f6;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .option:hover {
            background: #dfe7ff;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background: #0056b3;
        }

        .top {
            margin-bottom: 15px;
            color: #666;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="top">
        Question {{ index }} of {{ total }}
    </div>

    <div class="question">
        {{ question[1] }}
    </div>

    <form method="POST" action="">
    
    <input type="hidden" name="question_id" value="{{ question[0] }}">

    <label class="option">
        <input type="radio" name="answer" value="{{ question[2] }}">
        {{ question[2] }}
    </label>

    <label class="option">
        <input type="radio" name="answer" value="{{ question[3] }}">
        {{ question[3] }}
    </label>

    <label class="option">
        <input type="radio" name="answer" value="{{ question[4] }}">
        {{ question[4] }}
    </label>

    <label class="option">
        <input type="radio" name="answer" value="{{ question[5] }}">
        {{ question[5] }}
    </label>

    <button type="submit" class="btn">Next ➜</button>

</form>

</div>

</body>
</html>
