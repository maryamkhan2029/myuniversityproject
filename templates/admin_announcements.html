<!DOCTYPE html>
<html>
<head>
    <title>Admin Announcements</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #4a69bd;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }

        .delete {
            background: red;
            color: white;
        }

        .back {
            background: gray;
            color: white;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
        }

        .msg {
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="header">
    📢 All Announcements
</div>

<div class="container">

    <a href="/admin" class="btn back">⬅ Back to Dashboard</a>

    <br><br>

    {% for a in data %}
    <div class="card">
        <div class="title">{{ a[1] }}</div>
        <div class="msg">{{ a[2] }}</div>
        <small>Category: {{ a[3] }}</small>

        <br><br>

        <a href="/admin/delete_announcement/{{ a[0] }}" class="btn delete">Delete</a>
    </div>
    {% endfor %}

</div>

</body>
</html>
