<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f8cff,#6c63ff,#4a6cf7);
    overflow:hidden;
}

/* Background Circles */

body::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(255,255,255,.12);
    border-radius:50%;
    top:-100px;
    left:-80px;
}

body::after{
    content:"";
    position:absolute;
    width:280px;
    height:280px;
    background:rgba(255,255,255,.10);
    border-radius:50%;
    bottom:-90px;
    right:-70px;
}

.login-card{

    position:relative;
    width:420px;
    padding:40px;

    background:rgba(255,255,255,.96);

    border-radius:22px;

    box-shadow:0 20px 45px rgba(0,0,0,.18);

    z-index:10;
}

.logo{

    width:75px;
    height:75px;

    margin:auto;

    border-radius:18px;

    background:linear-gradient(135deg,#4f8cff,#6c63ff);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:34px;
    color:white;

    box-shadow:0 10px 25px rgba(79,140,255,.35);

}

h2{

    text-align:center;
    margin-top:20px;
    color:#24324b;
    font-size:28px;

}

.subtitle{

    text-align:center;
    color:#6c7a92;
    font-size:14px;
    margin-top:8px;
    margin-bottom:30px;

}

.input-box{

    margin-bottom:18px;

}

.input-box label{

    display:block;
    margin-bottom:8px;

    color:#334155;
    font-size:14px;
    font-weight:500;

}

.input-box input{

    width:100%;
    padding:14px 16px;

    border:1px solid #dbe5f1;
    border-radius:12px;

    background:#f8fbff;

    font-size:15px;

    transition:.3s;

}

.input-box input:focus{

    outline:none;
    border-color:#4f8cff;
    background:white;

    box-shadow:0 0 0 4px rgba(79,140,255,.15);

}

button{

    width:100%;
    padding:15px;

    border:none;
    border-radius:12px;

    background:linear-gradient(135deg,#4f8cff,#6c63ff);

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    transform:translateY(-2px);

    box-shadow:0 12px 25px rgba(79,140,255,.35);

}

.footer{

    text-align:center;
    margin-top:25px;

    color:#7b8794;
    font-size:13px;

}

.security{

    text-align:center;
    margin-top:12px;
    color:#4f8cff;
    font-size:13px;
    font-weight:500;

}

</style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        🛡️
    </div>

    <h2>Administrator Login</h2>

    <div class="subtitle">
        Secure Access to University Management System
    </div>

    <form method="POST">

        <div class="input-box">
            <label>Username</label>
            <input type="text"
                   name="username"
                   placeholder="Enter username"
                   required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password"
                   name="password"
                   placeholder="Enter password"
                   required>
        </div>

        <button type="submit">
            Login to Dashboard
        </button>

    </form>

    <div class="security">
        🔒 Protected Administrative Access
    </div>

    <div class="footer">
        © 2026 University Management System
    </div>

</div>

</body>
</html>
