<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Notes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#f8fafc,#eef2ff,#e0e7ff);
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#4f46e5,#3b82f6);
    padding:45px 20px;
    text-align:center;
    color:white;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
}

.header h2{
    font-size:34px;
    margin-bottom:10px;
}

.header p{
    font-size:15px;
    opacity:.9;
}

/* CONTAINER */
.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

/* NOTES GRID */
.notes-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

/* NOTE CARD */
.note-card{
    background:white;
    border-radius:24px;
    padding:25px;
    position:relative;
    overflow:hidden;

    box-shadow:0 10px 25px rgba(0,0,0,.05);
    transition:.35s;
}

.note-card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 40px rgba(59,130,246,.15);
}

/* TOP COLOR BAR */
.note-card::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:6px;
    background:linear-gradient(90deg,#4f46e5,#3b82f6);
}

/* FILE ICON */
.icon{
    width:70px;
    height:70px;
    border-radius:18px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(135deg,#4f46e5,#3b82f6);

    color:white;
    font-size:30px;

    margin-bottom:18px;

    box-shadow:0 8px 20px rgba(79,70,229,.25);
}

/* TITLE */
.note-card h3{
    color:#111827;
    font-size:20px;
    margin-bottom:12px;
}

/* DESCRIPTION */
.note-card p{
    color:#64748b;
    font-size:14px;
    margin-bottom:20px;
}

/* DOWNLOAD BUTTON */
.btn{
    display:inline-block;
    text-decoration:none;

    background:linear-gradient(135deg,#4f46e5,#3b82f6);
    color:white;

    padding:12px 22px;
    border-radius:12px;

    font-size:14px;
    font-weight:600;

    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* RESPONSIVE */
@media(max-width:768px){

    .header h2{
        font-size:28px;
    }

    .container{
        padding:25px 15px;
    }

    .notes-grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>📚 Study Notes Library</h2>
    <p>Access, organize and download your study materials</p>
</div>

<!-- CONTENT -->
<div class="container">

    <div class="notes-grid">

        {% for n in notes %}
        <div class="note-card">

            <div class="icon">
                📄
            </div>

            <h3>{{ n['title'] }}</h3>

            <p>
                Course notes and learning resources available for download.
            </p>

            <a class="btn"
               href="{{ n['file_path'] }}"
               download>
                ⬇ Download Note
            </a>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
