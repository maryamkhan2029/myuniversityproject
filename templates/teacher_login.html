<!DOCTYPE html>
<html>
<head>
<title>Faculty Access Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui, Segoe UI;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#faf7ff;
    overflow:hidden;
}

/* LIGHT PURPLE GRID */
body::before{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background-image: linear-gradient(rgba(168,85,247,0.08) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(168,85,247,0.08) 1px, transparent 1px);
    background-size:60px 60px;
}

/* PURPLE SOFT BLUR SHAPES */
.shape{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.25;
}

.shape1{
    width:320px;
    height:320px;
    background:#c084fc;
    top:-100px;
    left:-100px;
}

.shape2{
    width:360px;
    height:360px;
    background:#a78bfa;
    bottom:-120px;
    right:-120px;
}

/* CARD */
.card{
    width:420px;
    padding:40px;
    border-radius:18px;
    background:white;
    border:1px solid #ede9fe;
    box-shadow:0 20px 50px rgba(168,85,247,0.12);
    z-index:2;
    text-align:center;
}

/* BADGE */
.badge{
    display:inline-block;
    padding:6px 12px;
    font-size:11px;
    border-radius:20px;
    background:#f3e8ff;
    color:#7c3aed;
    margin-bottom:15px;
    font-weight:600;
}

/* TITLE */
.card h2{
    color:#1f2937;
    margin-bottom:5px;
}

.card p{
    color:#6b7280;
    font-size:13px;
    margin-bottom:25px;
}

/* INPUT */
input{
    width:100%;
    padding:12px 14px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #e5e7eb;
    background:#fafafa;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#a855f7;
    background:white;
    box-shadow:0 0 0 3px rgba(168,85,247,0.2);
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#a855f7,#c084fc);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(168,85,247,0.25);
}

/* FOOTER */
.small{
    margin-top:15px;
    font-size:12px;
    color:#9ca3af;
}
</style>

</head>

<body>

<div class="shape shape1"></div>
<div class="shape shape2"></div>

<div class="card">

    <div class="badge">FACULTY ACCESS ONLY</div>

    <h2>Faculty Control Panel</h2>
    <p>Sign in to manage academic operations</p>

    <form method="POST">
        <input type="email" name="email" placeholder="Faculty Email Address" required>
        <input type="password" name="password" placeholder="Secure Password" required>

        <button type="submit">Enter Dashboard</button>
    </form>

    <div class="small">
        Academic Management System • Secure Login
    </div>

</div>

</body>
</html>
