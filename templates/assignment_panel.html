<!DOCTYPE html>
<html>
<head>
    <title>Assignment Panel</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f7fb;
            padding:20px;
        }

        h2{
            text-align:center;
            color:#2563eb;
            margin-bottom:30px;
        }

        .container{
            max-width:800px;
            margin:auto;
        }

        .box{
            display:flex;
            gap:15px;
            justify-content:center;
            flex-wrap:wrap;
        }

        .card{
            flex:1;
            min-width:200px;
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
            text-align:center;
            transition:0.2s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .btn{
            display:block;
            margin-top:10px;
            padding:12px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        .btn:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📝 Teacher Assignment Panel</h2>

    <div class="box">

        <div class="card">
            <h3>➕ Create</h3>
            <a class="btn" href="/teacher/create-assignment">Open</a>
        </div>

        <div class="card">
            <h3>📋 View</h3>
            <a class="btn" href="/teacher/assignments">Open</a>
        </div>

        <div class="card">
            <h3>👨‍🎓 Students</h3>
            <a class="btn" href="/teacher/student-assignments">Open</a>
        </div>

    </div>

</div>

</body>
</html>
