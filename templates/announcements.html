<!DOCTYPE html>
<html>
<head>
    <title>Announcements</title>

    <style>
    body{
        font-family:Arial;
        background:#f4f7fb;
        padding:20px;
    }

    .card{
        background:white;
        padding:20px;
        margin-bottom:15px;
        border-radius:12px;
        box-shadow:0 5px 15px rgba(0,0,0,0.08);
        border-left:5px solid #3b82f6;
    }

    .card h3{
        margin-bottom:8px;
    }
    </style>
</head>

<body>

<h2>📢 Announcements</h2>

{% for a in announcements %}
<div class="card">
    <h3>{{ a[0] }}</h3>
    <p>{{ a[1] }}</p>
</div>
{% endfor %}

</body>
</html>
