<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eef6ff,#dbeafe,#f8fafc);
    padding:20px;
}

/* CHAT CARD */
.card{
    width:450px;
    height:700px;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(20px);
    border-radius:30px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.8);
    box-shadow:0 20px 50px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    padding:18px 22px;
    background:linear-gradient(135deg,#60a5fa,#38bdf8);
    color:white;
    display:flex;
    align-items:center;
    gap:15px;
    box-shadow:0 5px 20px rgba(96,165,250,.25);
}

.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    background:white;
    color:#0ea5e9;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
}

.info h2{
    font-size:18px;
    font-weight:600;
}

.info p{
    font-size:12px;
    opacity:0.9;
}

/* CHAT AREA */
.chatBox{
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
    background:#f8fafc;
}

/* COMMON MESSAGE */
.msg{
    max-width:80%;
    padding:14px 18px;
    border-radius:18px;
    font-size:14px;
    line-height:1.6;
    animation:fadeIn .25s ease;
    word-wrap:break-word;
}

/* BOT MESSAGE */
.bot{
    align-self:flex-start;
    background:white;
    color:#1e293b;
    border:1px solid #e2e8f0;
    border-radius:18px 18px 18px 5px;
    box-shadow:0 5px 15px rgba(0,0,0,.05);
}

/* USER MESSAGE */
.user{
    align-self:flex-end;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    border-radius:18px 18px 5px 18px;
    box-shadow:0 5px 15px rgba(37,99,235,.25);
}

/* INPUT AREA */
.inputBox{
    padding:15px;
    background:white;
    border-top:1px solid #e2e8f0;
    display:flex;
    gap:10px;
}

#msg{
    flex:1;
    padding:14px 18px;
    border:none;
    outline:none;
    background:#f1f5f9;
    color:#1e293b;
    border-radius:15px;
    font-size:14px;
}

#msg::placeholder{
    color:#94a3b8;
}

button{
    border:none;
    padding:14px 20px;
    border-radius:15px;
    cursor:pointer;
    background:linear-gradient(135deg,#38bdf8,#3b82f6);
    color:white;
    font-weight:600;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

button:active{
    transform:scale(.96);
}

/* SCROLLBAR */
.chatBox::-webkit-scrollbar{
    width:6px;
}

.chatBox::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:10px;
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */
@media(max-width:500px){

.card{
    width:100%;
    height:95vh;
}

}

</style>
</head>
<body>

<div class="card">

    <!-- HEADER -->
    <div class="header">

        <div class="avatar">✨</div>

        <div class="info">
            <h2>University AI Assistant</h2>
        </div>

    </div>

    <!-- CHAT AREA -->
    <div id="chat" class="chatBox">

        <div class="msg bot">
            Welcome! Ask a question instant assistance about university.
        </div>

    </div>

    <!-- INPUT -->
    <div class="inputBox">

        <input
            type="text"
            id="msg"
            placeholder="Type your message..."
            onkeypress="if(event.key==='Enter') send()"
        >

        <button onclick="send()">Send</button>

    </div>

</div>

<script>

function send(){

    let input = document.getElementById("msg");
    let text = input.value.trim();

    if(text === "") return;

    addMessage(text,"user");

    input.value = "";

    fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            query:text
        })
    })
    .then(res => res.json())
    .then(data => {

        addMessage(data.response,"bot");

    })
    .catch(error => {

        addMessage(
            "Unable to connect. Please try again.",
            "bot"
        );

    });

}

function addMessage(text,type){

    let chat = document.getElementById("chat");

    let div = document.createElement("div");

    div.classList.add("msg");
    div.classList.add(type);

    div.innerText = text;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
